---
layout: default
---

<article class="post">
    <h1>{{ page.title }}</h1>
    <p class="meta">{{ page.date | date_to_string }}</p>
    
    {{ content }}
</article>

<div class="navigation">
    {% if page.previous %}
        <a href="{{ page.previous.url }}" class="prev">← {{ page.previous.title }}</a>
    {% endif %}
    {% if page.next %}
        <a href="{{ page.next.url }}" class="next">{{ page.next.title }} →</a>
    {% endif %}
</div>
